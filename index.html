<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>untuk anai 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#050505,#121212,#1b1b1b);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:fall linear forwards;
opacity:.8;
}

@keyframes fall{

0%{
transform:translateY(-10vh) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

.container{

width:90%;
max-width:700px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 40px rgba(255,255,255,.08);

}

h1{

font-family:"Dancing Script",cursive;
font-size:55px;
margin-bottom:10px;
color:#ffd6df;

}

.subtitle{

font-size:17px;
opacity:.8;
margin-bottom:35px;

}

button{

padding:15px 35px;
border:none;
border-radius:40px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

#letter{

display:none;
margin-top:35px;
text-align:left;
line-height:1.9;
font-size:18px;
animation:fade .8s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.photo{

width:220px;
height:220px;
margin:auto;
overflow:hidden;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 25px rgba(255,255,255,.2);

}

.photo img{

width:100%;
height:100%;
object-fit:cover;

}

.type{

white-space:pre-line;

}

.signature{

margin-top:35px;
text-align:right;
font-style:italic;
opacity:.8;

}

audio{

display:none;

}

</style>

</head>

<body>

<div id="particles"></div>

<div class="container">

<h1>untuk anai 🤍</h1>

<p class="subtitle">
ada sesuatu yang pengen aku sampaikan...
</p>

<button onclick="bukaSurat()">
💌 klik di sini
</button>

<div id="letter">

<div class="photo">

<img src="foto.jpg">

</div>

<div class="type" id="typing"></div>

<div class="signature">

— dari seseorang yang masih berharap.

</div>

</div>

</div>

<audio id="musik" loop>

<source src="musik.mp3" type="audio/mpeg">

</audio>

<script>
  const surat = `

hai, anai.

kalau kamu lagi baca ini,
makasih ya udah mau klik tombol tadi.

jujur aja...
aku sempat bingung harus mulai dari mana.

soalnya ada banyak hal yang pengen aku sampaikan,
tapi setiap kali mau nulis,
rasanya semuanya cuma berhenti di kepala.

setiap kali aku lihat fotomu,
entah kenapa rasanya selalu sama.

aku senyum sendiri.

terus tiba-tiba keinget semua yang pernah kita lewatin.

hal-hal kecil yang dulu mungkin biasa aja,
sekarang malah jadi sesuatu yang paling sering aku rinduin.

aku tahu hubungan kita udah selesai.

mungkin memang ada banyak salah.

banyak ego.

banyak hal yang bikin kita akhirnya jalan masing-masing.

tapi semakin hari berlalu,

aku malah makin sadar...

kalau kehilangan kamu
bukan hal yang gampang buat diterima.

aku nggak bikin halaman ini buat maksa kamu balik.

aku cuma pengen jujur.

karena ternyata...

aku masih nyimpen rasa itu.

kadang aku suka mikir...

gimana ya kalau waktu itu kita sama-sama lebih sabar?

gimana kalau aku lebih ngerti perasaan kamu?

mungkin ceritanya bakal beda.

aku nggak tahu sekarang
perasaan kamu gimana.

mungkin udah berubah.

mungkin juga udah nggak sama lagi.

tapi kalau suatu hari nanti

semesta kasih kita kesempatan
buat ngobrol lagi...

aku cuma pengen ketemu
sebagai versi diri kita
yang lebih dewasa.

tanpa ego.

tanpa gengsi.

cuma dua orang
yang pernah saling sayang.

karena sejujurnya...

aku masih kangen kita.

bukan cuma kangennya sama orangnya.

tapi sama semua cerita
yang pernah kita punya.

dan kalau waktu
benar-benar bisa diulang...

aku pengen milih kamu lagi.

bukan buat ngulang
kesalahan yang sama.

tapi buat memperbaiki
semua yang dulu belum sempat kita jaga.

kalau ternyata
setelah ini kita tetap nggak bisa bersama...

nggak apa-apa.

setidaknya sekarang
kamu tahu...

kalau pernah ada seseorang
yang benar-benar sayang sama kamu.

makasih ya, nai.

semoga kamu selalu bahagia.

🤍

`;

function bukaSurat(){

document.querySelector("button").style.display="none";

document.getElementById("letter").style.display="block";

document.getElementById("musik").play();

ketik();

}

let i=0;

function ketik(){

if(i<surat.length){

document.getElementById("typing").innerHTML+=surat.charAt(i);

i++;

setTimeout(ketik,35);

}

    }
function buatHati(){

const hati=document.createElement("div");

hati.classList.add("heart");

hati.innerHTML=["🤍","❤️","💕","💖"][Math.floor(Math.random()*4)];

hati.style.left=Math.random()*100+"vw";

hati.style.animationDuration=(4+Math.random()*4)+"s";

hati.style.fontSize=(18+Math.random()*18)+"px";

document.getElementById("particles").appendChild(hati);

setTimeout(()=>{

hati.remove();

},8000);

}

setInterval(buatHati,250);



window.onload=()=>{

for(let i=0;i<20;i++){

setTimeout(buatHati,i*200);

}

};
</script>

</body>
</html>
